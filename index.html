<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Inventory Management System</h1>
        
        <!-- Form for adding/editing items -->
        <div class="form-container">
            <h2>Add/Edit Item</h2>
            <form id="inventoryForm">
                <div class="form-group">
                    <label for="itemId">Item ID:</label>
                    <input type="text" id="itemId" name="itemId" required>
                </div>
                <div class="form-group">
                    <label for="itemName">Item Name:</label>
                    <input type="text" id="itemName" name="itemName" required>
                </div>
                <div class="form-group">
                    <label for="category">Category:</label>
                    <select id="category" name="category" required>
                        <option value="Electronics">Electronics</option>
                        <option value="Furniture">Furniture</option>
                        <option value="Clothing">Clothing</option>
                        <option value="Tools">Tools</option>
                        <option value="Miscellaneous">Miscellaneous</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="quantity">Quantity:</label>
                    <input type="number" id="quantity" name="quantity" min="0" required>
                </div>
                <div class="form-group">
                    <label for="price">Price:</label>
                    <input type="number" id="price" name="price" min="0" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="supplier">Supplier Name:</label>
                    <input type="text" id="supplier" name="supplier" required>
                </div>
                <div class="form-group">
                    <label for="stockStatus">Stock Status:</label>
                    <select id="stockStatus" name="stockStatus" required>
                        <option value="In Stock">In Stock</option>
                        <option value="Low Stock">Low Stock</option>
                        <option value="Out of Stock">Out of Stock</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="popularItem">Popular Item:</label>
                    <select id="popularItem" name="popularItem" required>
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="comment">Comment:</label>
                    <textarea id="comment" name="comment"></textarea>
                </div>
                <div class="form-actions">
                    <button type="submit" id="addButton">Add Item</button>
                    <button type="button" id="updateButton" style="display: none;">Update Item</button>
                    <button type="button" id="cancelButton" style="display: none;">Cancel</button>
                </div>
            </form>
        </div>
        
        <!-- Search functionality -->
        <div class="search-container">
            <h2>Search Items</h2>
            <input type="text" id="searchInput" placeholder="Search by item name">
            <button id="searchButton">Search</button>
        </div>
        
        <!-- Display options -->
        <div class="display-options">
            <button id="displayAllButton">Display All Items</button>
            <button id="displayPopularButton">Display Popular Items</button>
        </div>
        
        <!-- Item list -->
        <div class="item-list">
            <h2>Items</h2>
            <div id="itemsContainer"></div>
        </div>
        
        <!-- Message area -->
        <div id="message"></div>
    </div>
    
    <script src="dist/app.js"></script>
</body>
</html>
